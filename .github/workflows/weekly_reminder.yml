name: Weekly CareerPilot Reminder

on:
  schedule:
    # Every Friday at 1PM UTC = 6PM PKT
    - cron: '0 13 * * 5'
  workflow_dispatch:    # Allow manual trigger from GitHub UI

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send reminder email
        env:
          REMINDER_EMAIL_SENDER:    ${{ secrets.REMINDER_EMAIL_SENDER }}
          REMINDER_EMAIL_PASSWORD:  ${{ secrets.REMINDER_EMAIL_PASSWORD }}
          REMINDER_EMAIL_RECEIVERS: ${{ secrets.REMINDER_EMAIL_RECEIVERS }}
        run: python scripts/weekly_reminder.py